<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>🏠 Mi Casa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-primary: #00d4aa;
            --accent-secondary: #7c3aed;
            --accent-glow: rgba(0, 212, 170, 0.5);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.06);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header-title span { font-size: 24px; }

        .header-time {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .time-value { font-size: 20px; font-weight: 600; }
        .time-date { font-size: 11px; color: var(--text-secondary); }

        .weather-mini {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }
        .weather-mini-icon { font-size: 18px; }
        .weather-mini-temp { font-size: 14px; font-weight: 600; }

        .fullscreen-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }

        /* MAIN LAYOUT */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ROOMS AREA */
        .rooms-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        /* ROOM CARD */
        .room-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s;
        }

        .room-card:hover {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .room-card.has-on {
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.1);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .room-info { display: flex; align-items: center; gap: 10px; }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 15px; font-weight: 600; }
        .room-count { font-size: 11px; color: var(--text-muted); }

        .room-toggle {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .room-toggle:hover { transform: scale(1.05); }
        .room-toggle.on {
            background: linear-gradient(135deg, var(--accent-primary), #0891b2);
            border-color: var(--accent-primary);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* LIGHTS GRID */
        .room-lights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* LIGHT TILE */
        .light-tile {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .light-tile:hover { background: rgba(255, 255, 255, 0.06); }
        .light-tile.on {
            background: rgba(0, 212, 170, 0.1);
            border-color: var(--accent-primary);
        }

        .light-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .light-icon { font-size: 24px; }
        .light-tile.on .light-icon { filter: drop-shadow(0 0 8px var(--accent-glow)); }

        .light-power {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .light-tile.on .light-power {
            background: var(--accent-primary);
            color: #000;
        }

        .light-name {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .light-tile.on .light-name { color: var(--text-primary); }

        /* DIMMER BAR */
        .light-dimmer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dimmer-track {
            flex: 1;
            height: 20px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .dimmer-fill {
            position: absolute;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 3px;
            transition: width 0.15s;
            pointer-events: none;
        }

        .dimmer-input {
            position: absolute;
            left: 0;
            width: 100%;
            height: 20px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        .dimmer-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .dimmer-value {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 28px;
            text-align: right;
        }
        .light-tile.on .dimmer-value { color: var(--accent-primary); }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* SCENES */
        .scenes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .scene-btn {
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .scene-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
        .scene-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.2), rgba(124, 58, 237, 0.2));
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }

        .scene-btn-icon { font-size: 24px; }
        .scene-btn-name { font-weight: 500; }

        /* BLINDS */
        .blinds-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .blind-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .blind-info { flex: 1; min-width: 0; overflow: hidden; }
        .blind-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .blind-status { font-size: 10px; color: var(--text-muted); }

        .blind-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .blind-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-secondary); }

        .blind-slider-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .blind-slider-container {
            width: 80px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: visible;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 0;
        }

        .blind-slider-fill {
            position: absolute;
            left: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--accent-secondary), #9333ea);
            border-radius: 4px;
            transition: width 0.15s;
            pointer-events: none;
        }

        .blind-range {
            position: absolute;
            left: 0;
            width: 80px;
            height: 20px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        .blind-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .blind-pos {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-secondary);
            min-width: 32px;
            text-align: right;
        }

        /* STATUS BAR */
        .status-bar {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .status-bar .connected { color: var(--accent-primary); }
        .status-bar .error { color: #ef4444; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

        /* NEWS TICKER */
        .news-ticker {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .news-badge {
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .news-track { flex: 1; overflow: hidden; }

        .news-content {
            display: flex;
            gap: 40px;
            animation: ticker 40s linear infinite;
            white-space: nowrap;
        }

        .news-item { font-size: 11px; color: var(--text-secondary); }
        .news-item span { color: var(--accent-primary); font-weight: 500; }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; }
            .sidebar-section { flex: 1; min-width: 200px; }
            .rooms-grid { grid-template-columns: 1fr; }
            .room-lights { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .header { padding: 10px 12px; }
            .header-title { font-size: 14px; }
            .weather-mini { display: none; }
            .rooms-area { padding: 12px; }
            .room-lights { grid-template-columns: repeat(2, 1fr); }
            .scenes-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-title"><span>🏠</span> Mi Casa</div>
        </div>
        <div class="header-time">
            <div class="time-display">
                <div class="time-value" id="time">--:--</div>
                <div class="time-date" id="date"></div>
            </div>
            <div class="weather-mini">
                <span class="weather-mini-icon" id="weatherIcon">⛅</span>
                <span class="weather-mini-temp" id="weatherTemp">--°</span>
            </div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <div class="main-container">
        <div class="rooms-area">
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Escenas</div>
                <div class="scenes-grid">
                    <button class="scene-btn" onclick="setScene('morning')">
                        <span class="scene-btn-icon">☀️</span>
                        <span class="scene-btn-name">Buenos días</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('movie')">
                        <span class="scene-btn-icon">🎬</span>
                        <span class="scene-btn-name">Película</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('relax')">
                        <span class="scene-btn-icon">☕</span>
                        <span class="scene-btn-name">Relax</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('away')">
                        <span class="scene-btn-icon">🚗</span>
                        <span class="scene-btn-name">Fuera</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-section" id="blindsSection" style="display: none;">
                <div class="sidebar-title">Persianas</div>
                <div class="blinds-list" id="blindsList"></div>
            </div>
        </div>
    </div>

    <div class="news-ticker">
        <span class="news-badge">News</span>
        <div class="news-track">
            <div class="news-content" id="newsContent"></div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Cargando...</span>
        <span id="lightsCount">0 luces encendidas</span>
    </div>

    <script>
        const API = 'http://192.168.1.172:9876/api';
        const TOKEN = 'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6IjBiOWQyMTZlODJmNzU4ZTlmMGEwNTE3ZDA4MzE2Y2I5MWM4OTlmMWMwZjE2MzFmODQ2YzE1Y2E4YTdhODJmZmMifQ.eyJpc3MiOiI2NTk1NDA4NS1kOGY4LTRjOTUtOTZiZi1mNGY0MDc4ODIyY2YiLCJ0eXBlIjoiYWNjZXNzIiwiYXVkIjoiaG9tZXNtYXJ0LmxvY2FsIiwic3ViIjoiOWMxNWNiNmMtNzRhNi00ZDJhLTk5MzAtMmFjMzY5Y2MzY2FjIiwiaWF0IjoxNzc0NzIzMjA2LCJleHAiOjIwOTAyOTkyMDZ9.mrFF36jF01Vs9LSMfcvAzUFZ1iNm0LeRH8NEEStLaBwGhzerUsPZQ2XPsfy74CStY1D20MYf1LGXJB4VTJCrlw';

        let devices = [];
        let activeScene = null;

        const ROOM_ICONS = {
            'Salón': '🛋️', 'Habitación': '🛏️', 'Baño': '🚿', 'Entrada': '🚪',
            'Despacho': '💻', 'Desván': '🏠', 'Ducha': '🚿', 'Mary': '🛁',
            'Escalera': '🪜', 'Estor': '🪟', 'Vestidor': '👔', 'Ender': '⚡'
        };
        const ROOM_ORDER = ['Salón', 'Habitación', 'Baño', 'Ducha', 'Entrada', 'Despacho', 'Desván', 'Escalera', 'Vestidor', 'Mary', 'Ender'];

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        async function loadWeather() {
            try {
                const res = await fetch('https://wttr.in/As%20Pontes?format=j1');
                const data = await res.json();
                const current = data.current_condition[0];
                document.getElementById('weatherIcon').textContent = getWeatherIcon(current.weatherCode);
                document.getElementById('weatherTemp').textContent = current.temp_C + '°C';
            } catch (e) { }
        }

        function getWeatherIcon(code) {
            if (code == 113) return '☀️';
            if (code == 116) return '⛅';
            if (code == 119 || code == 122) return '☁️';
            if (code >= 127 && code <= 143) return '🌧️';
            if (code >= 176 && code <= 263) return '🌧️';
            if (code >= 266 && code <= 299) return '🌧️';
            if (code >= 305 && code <= 386) return '🌧️';
            if (code >= 389 && code <= 395) return '⛈️';
            return '🌤️';
        }

        loadWeather();
        setInterval(loadWeather, 300000);

        const NEWS_ITEMS = [
            '<span>IA:</span> GPT-5 esperado para junio con razonamiento avanzado',
            '<span>Tech:</span> Apple presenta nuevos chips M4 para Mac',
            '<span>Cycling:</span> Pogacar gana otra etapa en el Tour',
            '<span>Spain:</span> El INE confirma crecimiento del PIB',
            '<span>AI:</span> Gemini 2.0 disponible con modo agente',
            '<span>Gaming:</span> GTA VI filtrado: primavera 2026',
            '<span>IA:</span> Claude Code supera 1M de desarrolladores',
            '<span>Tech:</span> Samsung lanza pantalla enrollable para 2026',
            '<span>Cycling:</span> Vingegaard se recupera para el Tour',
            '<span>Spain:</span> Galicia: tempo estable toda a semana'
        ];

        function loadNews() {
            let html = '';
            for (let i = 0; i < 3; i++) {
                NEWS_ITEMS.forEach(item => {
                    html += '<span class="news-item">' + item + '</span>';
                });
            }
            document.getElementById('newsContent').innerHTML = html;
        }
        loadNews();

        async function apiCall(endpoint, method, body) {
            try {
                const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                console.log('API call:', method, API + endpoint, body);
                const res = await fetch(API + endpoint, opts);
                console.log('API response status:', res.status);
                const text = await res.text();
                console.log('API response body:', text);
                try { return JSON.parse(text); } catch { return text; }
            } catch (e) { console.error('API error:', e); return null; }
        }

        async function loadDevices() {
            const statusEl = document.getElementById('statusText');
            statusEl.textContent = 'Conectando...';
            statusEl.className = '';
            const data = await apiCall('/v1/devices');
            if (data && Array.isArray(data)) {
                const prevDevices = devices;
                devices = data;

                // Check if light levels changed from server
                devices.forEach(d => {
                    if (d.type === 'light' || d.type === 'lamp') {
                        const prev = prevDevices.find(p => p.id === d.id);
                        if (prev && prev.attributes.lightLevel !== d.attributes.lightLevel) {
                            console.log('Server updated lightLevel for', d.attributes.customName || d.attributes.name, ':', prev.attributes.lightLevel, '->', d.attributes.lightLevel);
                        }
                    }
                });

                statusEl.textContent = '✓ Conectado';
                statusEl.className = 'connected';
                renderUI();
            } else {
                statusEl.textContent = '✗ Error de conexión';
                statusEl.className = 'error';
            }
        }

        function getRoom(name) {
            const n = name.toLowerCase();
            if (n.includes('salon') || n.includes('salón') || n.includes('living')) return 'Salón';
            if (n.includes('habitacion') || n.includes('habit')) return 'Habitación';
            if (n.includes('baño') || n.includes('bano')) return 'Baño';
            if (n.includes('ducha')) return 'Ducha';
            if (n.includes('entrada')) return 'Entrada';
            if (n.includes('despacho')) return 'Despacho';
            if (n.includes('desvan') || n.includes('desván')) return 'Desván';
            if (n.includes('escalera')) return 'Escalera';
            if (n.includes('estor')) return 'Estor';
            if (n.includes('vestidor')) return 'Vestidor';
            if (n.includes('mary')) return 'Mary';
            if (n.includes('ender') && !n.includes('salon') && !n.includes('salón')) return 'Ender';
            return 'Ender';
        }

        function getLightIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('techo')) return '💡';
            if (n.includes('mesa')) return '🪫';
            if (n.includes('pared')) return '🔦';
            if (n.includes('lampara')) return '🔆';
            return '💡';
        }

        async function toggleLight(id, isOn) {
            const dev = devices.find(d => d.id === id);
            if (!dev) return;
            dev.attributes.isOn = isOn;

            // Update UI directly without re-rendering
            const tile = document.querySelector('.light-tile[onclick*="' + id + '"]');
            if (tile) {
                if (isOn) {
                    tile.classList.add('on');
                    tile.querySelector('.light-power').textContent = '●';
                    tile.querySelector('.light-icon').style.filter = 'drop-shadow(0 0 8px var(--accent-glow))';
                } else {
                    tile.classList.remove('on');
                    tile.querySelector('.light-power').textContent = '○';
                    tile.querySelector('.light-icon').style.filter = '';
                }
            }

            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { isOn } }]);
        }

        async function setLightLevel(id, level) {
            level = parseInt(level);
            const dev = devices.find(d => d.id === id);
            if (!dev) return;

            const wasOn = dev.attributes.isOn;
            dev.attributes.isOn = true;
            dev.attributes.lightLevel = level;

            // Update UI immediately
            const fill = document.getElementById('dimmerFill_' + id);
            const valueEl = document.getElementById('dimmerValue_' + id);
            const input = document.getElementById('dimmerSlider_' + id);
            if (fill) fill.style.width = level + '%';
            if (valueEl) valueEl.textContent = level + '%';
            if (input) input.value = level;

            // Make sure tile shows as ON
            const tile = document.querySelector('.light-tile[onclick*="' + id + '"]');
            if (tile) {
                if (!tile.classList.contains('on')) {
                    tile.classList.add('on');
                    const power = tile.querySelector('.light-power');
                    if (power) {
                        power.textContent = '●';
                        power.classList.add('on');
                    }
                }
            }

            // API call - if light was off, turn on first, then set level
            if (!wasOn) {
                await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { isOn: true } }]);
                await new Promise(r => setTimeout(r, 100));
            }
            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { lightLevel: level } }]);
        }

        async function toggleRoom(roomName) {
            const roomDevices = devices.filter(d => {
                const name = d.attributes?.customName || d.attributes?.name || '';
                return getRoom(name) === roomName && (d.type === 'light' || d.type === 'lamp');
            });
            const anyOn = roomDevices.some(d => d.attributes?.isOn);
            const newState = !anyOn;
            for (const dev of roomDevices) {
                dev.attributes.isOn = newState;
                await apiCall('/v1/devices/' + dev.id, 'PATCH', [{ attributes: { isOn: newState } }]);
            }
            renderUI();
        }

        async function setBlind(id, pos) {
            const dev = devices.find(d => d.id === id);
            if (!dev) return;
            dev.attributes.blindsTargetLevel = parseInt(pos);
            dev.attributes.blindsCurrentLevel = parseInt(pos);

            // Update UI directly
            const fill = document.getElementById('blindFill_' + id);
            const posEl = document.getElementById('blindPos_' + id);
            if (fill) fill.style.width = pos + '%';
            if (posEl) posEl.textContent = pos + '%';

            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { blindsTargetLevel: parseInt(pos) } }]);
        }

        async function setScene(scene) {
            if (activeScene === scene) {
                document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
                activeScene = null;
                return;
            }

            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.scene-btn').classList.add('active');
            activeScene = scene;

            if (scene === 'morning') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = true;
                    d.attributes.lightLevel = 100;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: true, lightLevel: 100 } }]);
                });
            } else if (scene === 'relax') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = true;
                    d.attributes.lightLevel = 30;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: true, lightLevel: 30 } }]);
                });
            } else if (scene === 'movie') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    const name = d.attributes?.customName || d.attributes?.name || '';
                    if (name.toLowerCase().includes('techo')) {
                        d.attributes.isOn = false;
                    } else {
                        d.attributes.isOn = true;
                        d.attributes.lightLevel = 15;
                    }
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: d.attributes.isOn, lightLevel: d.attributes.lightLevel || 100 } }]);
                });
            } else if (scene === 'away') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = false;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: false } }]);
                });
            }
            renderUI();
        }

        function renderUI() {
            const rooms = {};
            const blinds = [];

            devices.forEach(d => {
                const type = d.type || '';
                const name = d.attributes?.customName || d.attributes?.name || '?';
                const room = getRoom(name);

                if (type === 'light' || type === 'lamp') {
                    if (!rooms[room]) rooms[room] = [];
                    rooms[room].push({ ...d, name });
                } else if (type.includes('blinds') || type.includes('blind')) {
                    blinds.push({ ...d, name });
                }
            });

            // Render room cards
            let roomsHtml = '';
            ROOM_ORDER.forEach(room => {
                if (!rooms[room]) return;
                const lights = rooms[room];
                const onCount = lights.filter(l => l.attributes?.isOn).length;
                const hasOn = onCount > 0;
                const icon = ROOM_ICONS[room] || '🏠';

                roomsHtml += '<div class="room-card' + (hasOn ? ' has-on' : '') + '">';
                roomsHtml += '<div class="room-header">';
                roomsHtml += '<div class="room-info">';
                roomsHtml += '<span class="room-icon">' + icon + '</span>';
                roomsHtml += '<div>';
                roomsHtml += '<div class="room-name">' + room + '</div>';
                roomsHtml += '<div class="room-count">' + onCount + ' de ' + lights.length + ' encendidas</div>';
                roomsHtml += '</div></div>';
                roomsHtml += '<button class="room-toggle' + (hasOn ? ' on' : '') + '" onclick="toggleRoom(\'' + room + '\')">' + (hasOn ? '⚡' : '○') + '</button>';
                roomsHtml += '</div>';
                roomsHtml += '<div class="room-lights">';

                lights.forEach(l => {
                    const isOn = l.attributes?.isOn;
                    const level = l.attributes?.lightLevel || 100;

                    roomsHtml += '<div class="light-tile' + (isOn ? ' on' : '') + '" onclick="toggleLight(\'' + l.id + '\', ' + !isOn + ')">';
                    roomsHtml += '<div class="light-top">';
                    roomsHtml += '<span class="light-icon">' + getLightIcon(l.name) + '</span>';
                    roomsHtml += '<button class="light-power" onclick="event.stopPropagation(); toggleLight(\'' + l.id + '\', ' + !isOn + ')">' + (isOn ? '●' : '○') + '</button>';
                    roomsHtml += '</div>';
                    roomsHtml += '<div class="light-name">' + l.name.split(' ').slice(1).join(' ') + '</div>';
                    roomsHtml += '<div class="light-dimmer" onclick="event.stopPropagation()">';
                    roomsHtml += '<div class="dimmer-track">';
                    roomsHtml += '<div class="dimmer-fill" id="dimmerFill_' + l.id + '" style="width: ' + level + '%"></div>';
                    roomsHtml += '<input type="range" class="dimmer-input" id="dimmerSlider_' + l.id + '" min="0" max="100" value="' + level + '" oninput="setLightLevel(\'' + l.id + '\', this.value)">';
                    roomsHtml += '</div>';
                    roomsHtml += '<span class="dimmer-value" id="dimmerValue_' + l.id + '">' + level + '%</span>';
                    roomsHtml += '</div></div>';
                });

                roomsHtml += '</div></div>';
            });

            document.getElementById('roomsGrid').innerHTML = roomsHtml;

            // Render blinds
            if (blinds.length) {
                document.getElementById('blindsSection').style.display = 'block';
                let blindsHtml = '';
                blinds.forEach(b => {
                    const pos = b.attributes?.blindsCurrentLevel ?? b.attributes?.blindsTargetLevel ?? 0;
                    blindsHtml += '<div class="blind-item">';
                    blindsHtml += '<div class="blind-info">';
                    blindsHtml += '<div class="blind-name">' + b.name + '</div>';
                    blindsHtml += '<div class="blind-status">' + pos + '% abierto</div>';
                    blindsHtml += '</div>';
                    blindsHtml += '<div class="blind-slider-wrap">';
                    blindsHtml += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 0)">▼</button>';
                    blindsHtml += '<div class="blind-slider-container">';
                    blindsHtml += '<div class="blind-slider-fill" id="blindFill_' + b.id + '" style="width: ' + pos + '%"></div>';
                    blindsHtml += '<input type="range" class="blind-range" min="0" max="100" value="' + pos + '" oninput="setBlind(\'' + b.id + '\', this.value)">';
                    blindsHtml += '</div>';
                    blindsHtml += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 100)">▲</button>';
                    blindsHtml += '</div>';
                    blindsHtml += '<span class="blind-pos" id="blindPos_' + b.id + '">' + pos + '%</span>';
                    blindsHtml += '</div>';
                });
                document.getElementById('blindsList').innerHTML = blindsHtml;
            } else {
                document.getElementById('blindsSection').style.display = 'none';
            }

            // Update status
            const allLights = Object.values(rooms).flat();
            const totalOn = allLights.filter(l => l.attributes?.isOn).length;
            document.getElementById('lightsCount').textContent = totalOn + ' luces encendidas';
        }

        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
