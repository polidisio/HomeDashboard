<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeDashboard - IKEA Dirigera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a24;
            --accent-primary: #00d4aa;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #00d4aa 0%, #0891b2 50%, #7c3aed 100%);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --glass-bg: rgba(18, 18, 26, 0.8);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-radius: 20px;
            --btn-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(8, 145, 178, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 32px rgba(0, 212, 170, 0.3);
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            font-size: 0.875rem;
            backdrop-filter: blur(12px);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--btn-radius);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.875rem;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(12px);
        }

        .refresh-btn:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .room-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            padding: 24px;
            backdrop-filter: blur(16px);
            transition: var(--transition);
        }

        .room-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .room-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        .room-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .room-name {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .device-count {
            margin-left: auto;
            padding: 4px 12px;
            background: rgba(0, 212, 170, 0.15);
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--accent-primary);
            font-weight: 500;
        }

        .devices-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .device-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            transition: var(--transition);
        }

        .device-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .device-item.active {
            background: rgba(0, 212, 170, 0.08);
            box-shadow: inset 0 0 20px rgba(0, 212, 170, 0.1);
        }

        .device-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: var(--bg-tertiary);
            transition: var(--transition);
        }

        .device-item.active .device-icon {
            background: var(--accent-gradient);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
        }

        .device-info {
            flex: 1;
            min-width: 0;
        }

        .device-name {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .device-status {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .toggle-switch {
            position: relative;
            width: 52px;
            height: 28px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--bg-tertiary);
            border-radius: 50px;
            transition: var(--transition);
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            left: 3px;
            top: 3px;
            background: var(--text-secondary);
            border-radius: 50%;
            transition: var(--transition);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-gradient);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(24px);
            background: white;
        }

        .blind-control {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .blind-slider-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .blind-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .blind-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent-secondary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
            transition: var(--transition);
        }

        .blind-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.7);
        }

        .blind-slider::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: var(--accent-secondary);
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.5);
        }

        .blind-position {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .blind-buttons {
            display: flex;
            gap: 6px;
        }

        .blind-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .blind-btn:hover {
            background: var(--accent-secondary);
            color: white;
            border-color: var(--accent-secondary);
        }

        .sensor-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
        }

        .sensor-card.triggered {
            background: rgba(245, 158, 11, 0.1);
            animation: sensorPulse 2s ease-in-out;
        }

        @keyframes sensorPulse {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: inset 0 0 20px rgba(245, 158, 11, 0.2); }
        }

        .sensor-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .sensor-status.active {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .sensor-status.inactive {
            background: rgba(136, 136, 160, 0.2);
            color: var(--text-secondary);
        }

        .battery-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .error-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 16px 24px;
            background: var(--error);
            color: white;
            border-radius: var(--btn-radius);
            font-size: 0.875rem;
            opacity: 0;
            transition: var(--transition);
            z-index: 1001;
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            .container {
                padding: 16px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .header-status {
                width: 100%;
                justify-content: space-between;
            }

            .rooms-grid {
                grid-template-columns: 1fr;
            }

            .room-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Conectando con Dirigera...</div>
    </div>

    <div class="error-toast" id="errorToast"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🏠</div>
                <h1>HomeDashboard</h1>
            </div>
            <div class="header-status">
                <div class="status-badge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Conectando...</span>
                </div>
                <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
                        <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
                    </svg>
                    Actualizar
                </button>
            </div>
        </header>

        <div class="rooms-grid" id="roomsGrid">
            <!-- Rooms will be populated dynamically -->
        </div>
    </div>

    <script>
        const API_BASE = 'https://192.168.1.226:8443';
        const TOKEN = 'eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6IjBiOWQyMTZlODJmNzU4ZTlmMGEwNTE3ZDA4MzE2Y2I5MWM4OTlmMWMwZjE2MzFmODQ2YzE1Y2E4YTdhODJmZmMifQ.eyJpc3MiOiI2NTk1NDA4NS1kOGY4LTRjOTUtOTZiZi1mNGY0MDc4ODIyY2YiLCJ0eXBlIjoiYWNjZXNzIiwiYXVkIjoiaG9tZXNtYXJ0LmxvY2FsIiwic3ViIjoiOWMxNWNiNmMtNzRhNi00ZDJhLTk5MzAtMmFjMzY5Y2MzY2FjIiwiaWF0IjoxNzc0NzIzMjA2LCJleHAiOjIwOTAyOTkyMDZ9.mrFF36jF01Vs9LSMfcvAzUFZ1iNm0LeRH8NEEStLaBwGhzerUsPZQ2XPsfy74CStY1D20MYf1LGXJB4VTJCrlw';

        let allDevices = [];
        let refreshInterval;
        let isRefreshing = false;

        const ROOM_ICONS = {
            'Salon': '🛋️',
            'salon': '🛋️',
            'Dormitorio': '🛏️',
            'dormitorio': '🛏️',
            'Habitacion': '🛏️',
            'habitacion': '🛏️',
            'Habitaciones': '🛏️',
            'habitaciones': '🛏️',
            'Baño': '🚿',
            'baño': '🚿',
            'banio': '🚿',
            'Entrada': '🚪',
            'entrada': '🚪',
            'Despacho': '💼',
            'despacho': '💼',
            'Desvan': '📦',
            'desvan': '📦',
            'Cocina': '🍳',
            'cocina': '🍳',
            'default': '💡'
        };

        const roomOrder = ['Salon', 'Dormitorio', 'Habitaciones', 'Baño', 'Entrada', 'Despacho', 'Desvan'];

        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE}${endpoint}`;
            const headers = {
                'Authorization': `Bearer ${TOKEN}`,
                'Content-Type': 'application/json',
                ...options.headers
            };

            try {
                const response = await fetch(url, { ...options, headers });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        function showError(message) {
            const toast = document.getElementById('errorToast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        function updateConnectionStatus(connected) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (connected) {
                dot.classList.remove('disconnected');
                text.textContent = 'Conectado';
            } else {
                dot.classList.add('disconnected');
                text.textContent = 'Desconectado';
            }
        }

        function formatLastUpdate() {
            const now = new Date();
            return now.toLocaleTimeString('es-ES', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
        }

        async function fetchDevices() {
            try {
                const data = await apiCall('/api/v1/devices');
                updateConnectionStatus(true);
                return data || [];
            } catch (error) {
                updateConnectionStatus(false);
                showError('Error al conectar con el hub Dirigera');
                throw error;
            }
        }

        function groupDevicesByRoom(devices) {
            const rooms = {};
            const blinds = { left: null, right: null };
            const sensors = [];

            devices.forEach(device => {
                const type = device.type || '';
                const capabilities = device.capabilities?.map(c => c.id) || [];
                
                if (type.includes('light') || capabilities.includes('light')) {
                    const room = device.room?.name || 'Sin habitación';
                    if (!rooms[room]) {
                        rooms[room] = [];
                    }
                    rooms[room].push({ ...device, deviceType: 'light' });
                }
                else if (type.includes('blinds') || type.includes('blind') || capabilities.includes('openable')) {
                    const name = device.customName || device.name || '';
                    if (name.toLowerCase().includes('izquierda') || name.toLowerCase().includes('left')) {
                        blinds.left = { ...device, deviceType: 'blind' };
                    } else if (name.toLowerCase().includes('derecha') || name.toLowerCase().includes('right')) {
                        blinds.right = { ...device, deviceType: 'blind' };
                    } else {
                        if (!rooms['Persianas']) rooms['Persianas'] = [];
                        rooms['Persianas'].push({ ...device, deviceType: 'blind' });
                    }
                }
                else if (type.includes('motion') || type.includes('sensor')) {
                    sensors.push({ ...device, deviceType: 'sensor' });
                }
            });

            return { rooms, blinds, sensors };
        }

        function renderRoomCard(roomName, devices) {
            const icon = ROOM_ICONS[roomName] || ROOM_ICONS.default;
            const sortedDevices = [...devices].sort((a, b) => {
                const nameA = a.customName || a.name || '';
                const nameB = b.customName || b.name || '';
                return nameA.localeCompare(nameB);
            });

            return `
                <div class="room-card">
                    <div class="room-header">
                        <div class="room-icon">${icon}</div>
                        <h2 class="room-name">${roomName}</h2>
                        <span class="device-count">${devices.length}</span>
                    </div>
                    <div class="devices-list">
                        ${sortedDevices.map(device => renderDevice(device)).join('')}
                    </div>
                </div>
            `;
        }

        function renderBlindsCard(blinds) {
            const leftBlind = blinds.left;
            const rightBlind = blinds.right;

            if (!leftBlind && !rightBlind) return '';

            return `
                <div class="room-card">
                    <div class="room-header">
                        <div class="room-icon">🪟</div>
                        <h2 class="room-name">Persianas</h2>
                        <span class="device-count">${(leftBlind ? 1 : 0) + (rightBlind ? 1 : 0)}</span>
                    </div>
                    <div class="devices-list">
                        ${leftBlind ? renderBlindDevice(leftBlind, 'Estor Izquierda') : ''}
                        ${rightBlind ? renderBlindDevice(rightBlind, 'Estor Derecha') : ''}
                    </div>
                </div>
            `;
        }

        function renderSensorsCard(sensors) {
            if (!sensors.length) return '';

            return `
                <div class="room-card">
                    <div class="room-header">
                        <div class="room-icon">📡</div>
                        <h2 class="room-name">Sensores</h2>
                        <span class="device-count">${sensors.length}</span>
                    </div>
                    <div class="devices-list">
                        ${sensors.map(sensor => renderSensor(sensor)).join('')}
                    </div>
                </div>
            `;
        }

        function renderDevice(device) {
            const name = device.customName || device.name || 'Dispositivo';
            const isOn = device.isOn || device.state?.isOn || false;
            const brightness = device.dimmer?.lightLevel || device.state?.dimmer?.lightLevel || 0;
            
            return `
                <div class="device-item ${isOn ? 'active' : ''}">
                    <div class="device-icon">${isOn ? '💡' : '🔅'}</div>
                    <div class="device-info">
                        <div class="device-name">${name}</div>
                        <div class="device-status">${isOn ? `Encendido · ${brightness}%` : 'Apagado'}</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" ${isOn ? 'checked' : ''} 
                            onchange="toggleLight('${device.id}', ${!isOn})">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            `;
        }

        function renderBlindDevice(device, defaultName) {
            const name = device.customName || device.name || defaultName;
            const position = device.blinds?.lampPosition || device.state?.blinds?.lampPosition || 0;
            const openLevel = 100 - position;

            return `
                <div class="device-item">
                    <div class="device-icon">${position < 50 ? '🪟' : '⬛'}</div>
                    <div class="device-info">
                        <div class="device-name">${name}</div>
                        <div class="device-status">${openLevel}% abierto</div>
                    </div>
                    <div class="blind-control">
                        <div class="blind-slider-container">
                            <input type="range" class="blind-slider" min="0" max="100" 
                                value="${openLevel}" onchange="setBlindPosition('${device.id}', this.value)"
                                oninput="updateBlindDisplay(this, '${device.id}')">
                            <div class="blind-position" id="position-${device.id}">${openLevel}%</div>
                        </div>
                        <div class="blind-buttons">
                            <button class="blind-btn" onclick="setBlindPosition('${device.id}', 0)">Abrir</button>
                            <button class="blind-btn" onclick="setBlindPosition('${device.id}', 50)">50%</button>
                            <button class="blind-btn" onclick="setBlindPosition('${device.id}', 100)">Cerrar</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSensor(sensor) {
            const name = sensor.customName || sensor.name || 'Sensor';
            const isOn = sensor.isOn || sensor.state?.isOn || false;
            const lastTriggered = sensor.lastTriggered || null;
            
            const battery = sensor.battery?.percentage || sensor.state?.battery?.percentage || null;
            
            let lastTriggeredText = 'Nunca';
            if (lastTriggered) {
                const date = new Date(lastTriggered);
                const now = new Date();
                const diff = Math.floor((now - date) / 1000);
                
                if (diff < 60) lastTriggeredText = 'Hace un momento';
                else if (diff < 3600) lastTriggeredText = `Hace ${Math.floor(diff / 60)} min`;
                else if (diff < 86400) lastTriggeredText = `Hace ${Math.floor(diff / 3600)} h`;
                else lastTriggeredText = date.toLocaleDateString('es-ES');
            }

            return `
                <div class="sensor-card ${isOn ? 'triggered' : ''}">
                    <div class="device-icon">${isOn ? '🔔' : '📡'}</div>
                    <div class="device-info">
                        <div class="device-name">${name}</div>
                        <div class="device-status">Último movimiento: ${lastTriggeredText}</div>
                    </div>
                    <div class="sensor-status ${isOn ? 'active' : 'inactive'}">
                        ${isOn ? '● Activo' : '○ Inactivo'}
                    </div>
                    ${battery !== null ? `
                        <div class="battery-indicator">
                            <span>🔋</span>${battery}%
                        </div>
                    ` : ''}
                </div>
            `;
        }

        function updateBlindDisplay(slider, deviceId) {
            const positionEl = document.getElementById(`position-${deviceId}`);
            if (positionEl) {
                positionEl.textContent = `${slider.value}%`;
            }
        }

        async function toggleLight(deviceId, turnOn) {
            try {
                await apiCall(`/api/v1/devices/${deviceId}/actions`, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'setLight',
                        lightLevel: turnOn ? 100 : 0,
                        isOn: turnOn
                    })
                });
                setTimeout(refreshAll, 300);
            } catch (error) {
                showError('Error al cambiar el estado de la luz');
            }
        }

        let blindTimeout = {};
        function setBlindPosition(deviceId, position) {
            if (blindTimeout[deviceId]) {
                clearTimeout(blindTimeout[deviceId]);
            }
            
            blindTimeout[deviceId] = setTimeout(async () => {
                try {
                    const closeAmount = parseInt(position);
                    await apiCall(`/api/v1/devices/${deviceId}/actions`, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'setBlinds',
                            blindsLampPosition: closeAmount
                        })
                    });
                    setTimeout(refreshAll, 300);
                } catch (error) {
                    showError('Error al mover la persiana');
                }
            }, 300);
        }

        async function refreshAll() {
            if (isRefreshing) return;
            
            isRefreshing = true;
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('loading');
            
            try {
                allDevices = await fetchDevices();
                renderDashboard(allDevices);
            } catch (error) {
                console.error('Refresh error:', error);
            } finally {
                isRefreshing = false;
                btn.classList.remove('loading');
                document.getElementById('statusText').textContent = `Actualizado ${formatLastUpdate()}`;
            }
        }

        function renderDashboard(devices) {
            const { rooms, blinds, sensors } = groupDevicesByRoom(devices);
            const grid = document.getElementById('roomsGrid');
            
            let html = '';
            
            roomOrder.forEach(roomName => {
                if (rooms[roomName] && rooms[roomName].length > 0) {
                    html += renderRoomCard(roomName, rooms[roomName]);
                }
            });
            
            Object.keys(rooms).forEach(roomName => {
                if (!roomOrder.includes(roomName) && rooms[roomName].length > 0) {
                    html += renderRoomCard(roomName, rooms[roomName]);
                }
            });
            
            html += renderBlindsCard(blinds);
            html += renderSensorsCard(sensors);
            
            if (!html) {
                html = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                        </svg>
                        <p>No se encontraron dispositivos</p>
                        <p style="font-size: 0.875rem; margin-top: 8px;">Conecta tu hub Dirigera para comenzar</p>
                    </div>
                `;
            }
            
            grid.innerHTML = html;
        }

        async function init() {
            try {
                allDevices = await fetchDevices();
                document.getElementById('loadingOverlay').classList.add('hidden');
                renderDashboard(allDevices);
                
                refreshInterval = setInterval(refreshAll, 5000);
            } catch (error) {
                document.getElementById('loadingOverlay').classList.add('hidden');
                showError('No se pudo conectar con el hub. Intenta de nuevo.');
            }
        }

        init();
    </script>
</body>
</html>
