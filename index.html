<!DOCTYPE html>
<!--
    HomeDashboard - IKEA Dirigera Smart Home Controller
    =================================================
    A tablet-optimized dashboard for controlling IKEA Dirigera smart home devices.

    Features:
    - Room-based light control with dimming
    - RGB and color temperature support for compatible bulbs
    - Blind/shutter control
    - Scene activation (Morning, Movie, Relax, Away)
    - Live news ticker with tech/dev/sports feeds
    - Weather display
    - Responsive design for tablet and mobile

    API Integration:
    - Connects to local Dirigera hub via proxy (http://192.168.1.172:9876)
    - Uses REST API with Bearer token authentication
    - Auto-refreshes device state every 5 seconds

    Author: polidisio
    Version: 2.0
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>🏠 Mi Casa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
    /*
     * CSS VARIABLES
     * ============
     * Centralized design tokens for consistent theming.
     * Modify these values to customize the dashboard appearance.
     */
    :root {
        --bg-primary: #0a0a0f;        /* Main background - deep midnight */
        --bg-secondary: #12121a;      /* Card backgrounds */
        --bg-card: #1a1a24;          /* Elevated surfaces */
        --accent-primary: #00d4aa;    /* Teal - active states, primary actions */
        --accent-secondary: #7c3aed;   /* Purple - sliders, secondary accent */
        --accent-glow: rgba(0, 212, 170, 0.5);  /* Glow effect for active devices */
        --text-primary: #f0f0f5;      /* Main text color */
        --text-secondary: #8888a0;    /* Muted text */
        --text-muted: #555566;        /* Disabled/hint text */
        --success: #22c55e;           /* Success indicators */
        --border: rgba(255, 255, 255, 0.06);   /* Subtle borders */
    }

    /* Reset and base styles */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* Full-height layout */
    html, body { height: 100%; overflow: hidden; }

    /* Body uses flexbox for header-main-footer structure */
    body {
        font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
    }

    /* ===== HEADER STYLES ===== */
    /* Fixed header with blur effect, contains title, time, weather, and fullscreen button */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent-primary: #00d4aa;
            --accent-secondary: #7c3aed;
            --accent-glow: rgba(0, 212, 170, 0.5);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555566;
            --success: #22c55e;
            --border: rgba(255, 255, 255, 0.06);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(18, 18, 26, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .header-title span { font-size: 24px; }

        .header-time {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .time-value { font-size: 20px; font-weight: 600; }
        .time-date { font-size: 11px; color: var(--text-secondary); }

        .weather-mini {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }
        .weather-mini-icon { font-size: 18px; }
        .weather-mini-temp { font-size: 14px; font-weight: 600; }

        .fullscreen-btn {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }

        /* ===== MAIN LAYOUT =====
         * Flex container with header, scrollable main content, and sidebar */
        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ===== ROOMS AREA =====
         * Main scrollable area containing room cards */
        .rooms-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Responsive grid - cards auto-fit based on minimum width */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 16px;
        }

        /* ===== ROOM CARD =====
         * Container for a single room's lights. Glows when any light is on. */
        .room-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            transition: all 0.3s;
        }
        .room-card:hover { border-color: rgba(255, 255, 255, 0.1); }
        .room-card.has-on {
            border-color: var(--accent-primary);
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.1);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .room-info { display: flex; align-items: center; gap: 10px; }
        .room-icon { font-size: 28px; }
        .room-name { font-size: 15px; font-weight: 600; }
        .room-count { font-size: 11px; color: var(--text-muted); }

        /* Room toggle button - turns all lights in room on/off */
        .room-toggle {
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            font-size: 20px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .room-toggle:hover { transform: scale(1.05); }
        .room-toggle.on {
            background: linear-gradient(135deg, var(--accent-primary), #0891b2);
            border-color: var(--accent-primary);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        /* ===== LIGHTS GRID =====
         * 3-column grid of light tiles within each room */
        .room-lights {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* ===== LIGHT TILE =====
         * Individual light control with icon, name, dimmer, and optional color controls */
        .light-tile {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .light-tile:hover { background: rgba(255, 255, 255, 0.06); }
        .light-tile.on {
            background: rgba(0, 212, 170, 0.1);
            border-color: var(--accent-primary);
        }

        .light-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .light-icon { font-size: 24px; }
        .light-tile.on .light-icon { filter: drop-shadow(0 0 8px var(--accent-glow)); }

        .light-power {
            width: 24px; height: 24px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 10px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .light-tile.on .light-power {
            background: var(--accent-primary);
            color: #000;
        }

        .light-name {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .light-tile.on .light-name { color: var(--text-primary); }

        /* DIMMER BAR */
        .light-dimmer {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dimmer-track {
            flex: 1;
            height: 20px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .dimmer-fill {
            position: absolute;
            left: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 3px;
            transition: width 0.15s;
            pointer-events: none;
        }

        .dimmer-input {
            position: absolute;
            left: 0;
            width: 100%;
            height: 20px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        .dimmer-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .dimmer-value {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 28px;
            text-align: right;
        }
        .light-tile.on .dimmer-value { color: var(--accent-primary); }

        /* COLOR CONTROLS */
        .light-colors {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }

        .color-temp-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-temp-track {
            flex: 1;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(90deg, #ff9329 0%, #fff5e6 50%, #cce6ff 100%);
            position: relative;
        }

        .color-temp-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            transition: width 0.1s;
        }

        .color-temp-input {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 12px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
        }
        .color-temp-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .color-temp-value {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 32px;
            text-align: right;
        }

        .color-rgb-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }

        .color-rgb-preview {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .color-rgb-hue-track {
            flex: 1;
            height: 16px;
            border-radius: 8px;
            background: linear-gradient(to right,
                hsl(0,100%,50%),
                hsl(60,100%,50%),
                hsl(120,100%,50%),
                hsl(180,100%,50%),
                hsl(240,100%,50%),
                hsl(300,100%,50%),
                hsl(360,100%,50%)
            );
            position: relative;
        }

        .color-rgb-hue-fill {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            background: rgba(0,0,0,0.5);
            border-radius: 0 8px 8px 0;
            transition: width 0.1s;
        }

        .color-rgb-hue-input {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 16px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
        }
        .color-rgb-hue-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .color-rgb-input {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            padding: 0;
            background: transparent;
            flex-shrink: 0;
        }
        .color-rgb-input::-webkit-color-swatch-wrapper { padding: 0; }
        .color-rgb-input::-webkit-color-swatch {
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        /* SCENES */
        .scenes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .scene-btn {
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .scene-btn:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-2px); }
        .scene-btn.active {
            background: linear-gradient(135deg, rgba(0, 212, 170, 0.2), rgba(124, 58, 237, 0.2));
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.2);
        }

        .scene-btn-icon { font-size: 24px; }
        .scene-btn-name { font-weight: 500; }

        /* BLINDS */
        .blinds-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .blind-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }

        .blind-info { flex: 1; min-width: 0; overflow: hidden; }
        .blind-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .blind-status { font-size: 10px; color: var(--text-muted); }

        .blind-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .blind-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-secondary); }

        .blind-slider-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .blind-slider-container {
            width: 80px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: visible;
            position: relative;
            display: flex;
            align-items: center;
            z-index: 0;
        }

        .blind-slider-fill {
            position: absolute;
            left: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--accent-secondary), #9333ea);
            border-radius: 4px;
            transition: width 0.15s;
            pointer-events: none;
        }

        .blind-range {
            position: absolute;
            left: 0;
            width: 80px;
            height: 20px;
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
            margin: 0;
            padding: 0;
            z-index: 1;
        }
        .blind-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .blind-pos {
            font-size: 11px;
            font-weight: 600;
            color: var(--accent-secondary);
            min-width: 32px;
            text-align: right;
        }

        /* STATUS BAR */
        .status-bar {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .status-bar .connected { color: var(--accent-primary); }
        .status-bar .error { color: #ef4444; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }

        /* NEWS TICKER */
        .news-ticker {
            background: var(--bg-secondary);
            padding: 8px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .news-badge {
            background: #ef4444;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .news-track { flex: 1; overflow: hidden; }

        .news-content {
            display: flex;
            gap: 40px;
            animation: ticker 40s linear infinite;
            white-space: nowrap;
        }

        .news-item { font-size: 11px; color: var(--text-secondary); }
        .news-item span { color: var(--accent-primary); font-weight: 500; }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; }
            .sidebar-section { flex: 1; min-width: 200px; }
            .rooms-grid { grid-template-columns: 1fr; }
            .room-lights { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .header { padding: 10px 12px; }
            .header-title { font-size: 14px; }
            .weather-mini { display: none; }
            .rooms-area { padding: 12px; }
            .room-lights { grid-template-columns: repeat(2, 1fr); }
            .scenes-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="header-title"><span>🏠</span> Mi Casa</div>
        </div>
        <div class="header-time">
            <div class="time-display">
                <div class="time-value" id="time">--:--</div>
                <div class="time-date" id="date"></div>
            </div>
            <div class="weather-mini">
                <span class="weather-mini-icon" id="weatherIcon">⛅</span>
                <span class="weather-mini-temp" id="weatherTemp">--°</span>
            </div>
            <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
        </div>
    </div>

    <div class="main-container">
        <div class="rooms-area">
            <div class="rooms-grid" id="roomsGrid"></div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Escenas</div>
                <div class="scenes-grid">
                    <button class="scene-btn" onclick="setScene('morning')">
                        <span class="scene-btn-icon">☀️</span>
                        <span class="scene-btn-name">Buenos días</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('movie')">
                        <span class="scene-btn-icon">🎬</span>
                        <span class="scene-btn-name">Película</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('relax')">
                        <span class="scene-btn-icon">☕</span>
                        <span class="scene-btn-name">Relax</span>
                    </button>
                    <button class="scene-btn" onclick="setScene('away')">
                        <span class="scene-btn-icon">🚗</span>
                        <span class="scene-btn-name">Fuera</span>
                    </button>
                </div>
            </div>

            <div class="sidebar-section" id="blindsSection" style="display: none;">
                <div class="sidebar-title">Persianas</div>
                <div class="blinds-list" id="blindsList"></div>
            </div>
        </div>
    </div>

    <div class="news-ticker">
        <span class="news-badge">News</span>
        <div class="news-track">
            <div class="news-content" id="newsContent"></div>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusText">Cargando...</span>
        <span id="lightsCount">0 luces encendidas</span>
    </div>

    <script>
        /* ========================================================================
         * CONFIGURATION
         * ========================================================================
         * API endpoint and authentication token for Dirigera hub
         * Note: TOKEN should be stored securely in production
         */
        const API = 'http://192.168.1.172:9876/api';

        /**

         * @param {number} hue - Hue value (0-360 degrees)
         * @param {number} saturation - Saturation (0-1), defaults to current
         */
        async function setRgbColor(id, hue, saturation = null) {
            hue = parseFloat(hue);
            const dev = devices.find(d => d.id === id);
            if (!dev) return;
            if (saturation === null) saturation = dev.attributes.colorSaturation || 1;
            dev.attributes.colorHue = hue;
            dev.attributes.colorSaturation = saturation;

            // Update UI
            const preview = document.getElementById('rgbPreview_' + id);
            const fill = document.getElementById('rgbFill_' + id);
            const valueEl = document.getElementById('rgbValue_' + id);
            const input = document.getElementById('rgbSlider_' + id);
            const rgbColor = hueToRgb(hue, saturation, 0.5);

            if (preview) preview.style.background = rgbColor;
            if (fill) fill.style.width = (100 - (hue / 360) * 100) + '%';
            if (valueEl) valueEl.textContent = Math.round(hue) + '°';
            if (input) input.value = hue;

            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { colorHue: hue, colorSaturation: saturation } }]);
        }

        /**
         * Convert HSL color to hex string
         * @param {number} hue - Hue (0-360)
         * @param {number} saturation - Saturation (0-1)
         * @param {number} lightness - Lightness (0-1)
         * @returns {string} Hex color e.g., '#ff5500'
         */
        function hueToRgb(hue, saturation, lightness) {
            const c = (1 - Math.abs(2 * lightness - 1)) * saturation;
            const x = c * (1 - Math.abs((hue / 60) % 2 - 1));
            const m = lightness - c/2;
            let r, g, b;
            if (hue < 60) { r = c; g = x; b = 0; }
            else if (hue < 120) { r = x; g = c; b = 0; }
            else if (hue < 180) { r = 0; g = c; b = x; }
            else if (hue < 240) { r = 0; g = x; b = c; }
            else if (hue < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }
            return '#' + [Math.round((r+m)*255), Math.round((g+m)*255), Math.round((b+m)*255)].map(v => v.toString(16).padStart(2,'0')).join('');
        }

        /**
         * Convert hex color to hue value
         * @param {string} hex - Hex color e.g., '#ff5500'
         * @returns {number} Hue (0-360)
         */
        function hexToHue(hex) {
            const r = parseInt(hex.slice(1,3), 16) / 255;
            const g = parseInt(hex.slice(3,5), 16) / 255;
            const b = parseInt(hex.slice(5,7), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h;
            if (max === min) h = 0;
            else if (max === r) h = 60 * ((g - b) / (max - min) + (g < b ? 6 : 0));
            else if (max === g) h = 60 * ((b - r) / (max - min) + 2);
            else h = 60 * ((r - g) / (max - min) + 4);
            return Math.round(h);
        }

        /**

            const roomDevices = devices.filter(d => {
                const name = d.attributes?.customName || d.attributes?.name || '';
                return getRoom(name) === roomName && (d.type === 'light' || d.type === 'lamp');
            });
            const anyOn = roomDevices.some(d => d.attributes?.isOn);
            const newState = !anyOn;
            for (const dev of roomDevices) {
                dev.attributes.isOn = newState;
                await apiCall('/v1/devices/' + dev.id, 'PATCH', [{ attributes: { isOn: newState } }]);

            renderUI();

         * Pre-configured lighting moods that affect all lights
         * - morning: All lights on at 100%
         * - relax: All lights on at 30%
         * - movie: Ceiling lights off, others dimmed to 15%
         * - away: All lights off
         */

        /**
         * Activate a scene preset
         * @param {string} scene - Scene name: 'morning', 'relax', 'movie', 'away'
         */
        async function setScene(scene) {
            if (activeScene === scene) {
                document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
                activeScene = null;
                return;
            }

            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.scene-btn').classList.add('active');
            activeScene = scene;

            if (scene === 'morning') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = true;
                    d.attributes.lightLevel = 100;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: true, lightLevel: 100 } }]);
                });
            } else if (scene === 'relax') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = true;
                    d.attributes.lightLevel = 30;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: true, lightLevel: 30 } }]);
                });
            } else if (scene === 'movie') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    const name = d.attributes?.customName || d.attributes?.name || '';
                    if (name.toLowerCase().includes('techo')) {
                        d.attributes.isOn = false;
                    } else {
                        d.attributes.isOn = true;
                        d.attributes.lightLevel = 15;
                    }
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: d.attributes.isOn, lightLevel: d.attributes.lightLevel || 100 } }]);
                });
            } else if (scene === 'away') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = false;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: false } }]);
                });
            }
            renderUI();
        }

        /* ========================================================================
         * UI RENDERING
         * ========================================================================
         * Main function that builds the DOM from device state.
         * Called on initial load and after device refresh.
         *
         * Note: Individual controls (toggleLight, setLightLevel, etc.) update
         * the DOM directly to avoid full re-renders which would reset slider
         * positions and user input.
         */

        /**
         * Render entire UI based on current devices state
         * Groups devices by room, detects light capabilities, renders appropriate controls
         */
        function renderUI() {
            const rooms = {};
            const blinds = [];

            // Group devices by room and type
            devices.forEach(d => {
                const type = d.type || '';
                const name = d.attributes?.customName || d.attributes?.name || '?';
                const room = getRoom(name);

                if (type === 'light' || type === 'lamp') {
                    if (!rooms[room]) rooms[room] = [];
                    rooms[room].push({ ...d, name });
                } else if (type.includes('blinds') || type.includes('blind')) {
                    blinds.push({ ...d, name });
                }
            });

            // Render room cards in configured order
            let roomsHtml = '';
            ROOM_ORDER.forEach(room => {
                if (!rooms[room]) return;
                const lights = rooms[room];
                const onCount = lights.filter(l => l.attributes?.isOn).length;
                const hasOn = onCount > 0;
                const icon = ROOM_ICONS[room] || '🏠';

                // Room card header
                roomsHtml += '<div class="room-card' + (hasOn ? ' has-on' : '') + '">';
                roomsHtml += '<div class="room-header">';
                roomsHtml += '<div class="room-info">';
                roomsHtml += '<span class="room-icon">' + icon + '</span>';
                roomsHtml += '<div>';
                roomsHtml += '<div class="room-name">' + room + '</div>';
                roomsHtml += '<div class="room-count">' + onCount + ' de ' + lights.length + ' encendidas</div>';
                roomsHtml += '</div></div>';
                roomsHtml += '<button class="room-toggle' + (hasOn ? ' on' : '') + '" onclick="toggleRoom(\'' + room + '\')">' + (hasOn ? '⚡' : '○') + '</button>';
                roomsHtml += '</div>';
                roomsHtml += '<div class="room-lights">';

                // Light tiles
                lights.forEach(l => {
                    const isOn = l.attributes?.isOn;
                    const level = l.attributes?.lightLevel || 100;
                    const hasColorHue = l.attributes?.colorHue !== undefined;
                    const hasColorTemp = l.attributes?.colorTemperature !== undefined;

                    roomsHtml += '<div class="light-tile' + (isOn ? ' on' : '') + '" onclick="toggleLight(\'' + l.id + '\', ' + !isOn + ')">';
                    roomsHtml += '<div class="light-top">';
                    roomsHtml += '<span class="light-icon">' + getLightIcon(l.name) + '</span>';
                    roomsHtml += '<button class="light-power" onclick="event.stopPropagation(); toggleLight(\'' + l.id + '\', ' + !isOn + ')">' + (isOn ? '●' : '○') + '</button>';
                    roomsHtml += '</div>';
                    roomsHtml += '<div class="light-name">' + l.name.split(' ').slice(1).join(' ') + '</div>';

                    // Dimmer control
                    roomsHtml += '<div class="light-dimmer" onclick="event.stopPropagation()">';
                    roomsHtml += '<div class="dimmer-track">';
                    roomsHtml += '<div class="dimmer-fill" id="dimmerFill_' + l.id + '" style="width: ' + level + '%"></div>';
                    roomsHtml += '<input type="range" class="dimmer-input" id="dimmerSlider_' + l.id + '" min="0" max="100" value="' + level + '" oninput="setLightLevel(\'' + l.id + '\', this.value)">';
                    roomsHtml += '</div>';
                    roomsHtml += '<span class="dimmer-value" id="dimmerValue_' + l.id + '">' + level + '%</span>';
                    roomsHtml += '</div>';

                    // Color temperature control (white bulbs only)
                    if (hasColorTemp && !hasColorHue) {
                        const temp = l.attributes.colorTemperature || 2700;
                        const tempPct = ((temp - 2200) / (6535 - 2200)) * 100;
                        roomsHtml += '<div class="light-colors" onclick="event.stopPropagation()">';
                        roomsHtml += '<div class="color-temp-wrap">';
                        roomsHtml += '<div class="color-temp-track">';
                        roomsHtml += '<div class="color-temp-fill" id="colorTempFill_' + l.id + '" style="width: ' + (100 - tempPct) + '%"></div>';
                        roomsHtml += '<input type="range" class="color-temp-input" id="colorTempInput_' + l.id + '" min="2200" max="6535" value="' + temp + '" oninput="setColorTemperature(\'' + l.id + '\', this.value)">';
                        roomsHtml += '</div>';
                        roomsHtml += '<span class="color-temp-value" id="colorTempValue_' + l.id + '">' + temp + 'K</span>';
                        roomsHtml += '</div>';
                        roomsHtml += '</div>';
                    }

                    // RGB color control (color-capable bulbs)
                    if (hasColorHue) {
                        const hue = l.attributes.colorHue || 0;
                        const sat = l.attributes.colorSaturation || 1;
                        const rgbColor = hueToRgb(hue, sat, 0.5);
                        roomsHtml += '<div class="light-colors" onclick="event.stopPropagation()">';
                        roomsHtml += '<div class="color-rgb-wrap">';
                        roomsHtml += '<input type="color" class="color-rgb-input" id="rgbInput_' + l.id + '" value="' + rgbColor + '" oninput="let h=this.value;setRgbColor(\'' + l.id + '\', hexToHue(h), 1)">';
                        roomsHtml += '<div class="color-rgb-hue-track">';
                        roomsHtml += '<div class="color-rgb-hue-fill" id="rgbFill_' + l.id + '" style="width:' + (100 - (hue/360)*100) + '%"></div>';
                        roomsHtml += '<input type="range" class="color-rgb-hue-input" id="rgbSlider_' + l.id + '" min="0" max="360" value="' + Math.round(hue) + '" oninput="setRgbColor(\'' + l.id + '\', this.value)">';
                        roomsHtml += '</div>';
                        roomsHtml += '</div>';
                        roomsHtml += '</div>';
                    }

                    roomsHtml += '</div>';
                });

                roomsHtml += '</div></div>';
            });

            document.getElementById('roomsGrid').innerHTML = roomsHtml;

            // Render blinds in sidebar
            if (blinds.length) {
                document.getElementById('blindsSection').style.display = 'block';
                let blindsHtml = '';
                blinds.forEach(b => {
                    const pos = b.attributes?.blindsCurrentLevel ?? b.attributes?.blindsTargetLevel ?? 0;
                    blindsHtml += '<div class="blind-item">';
                    blindsHtml += '<div class="blind-info">';
                    blindsHtml += '<div class="blind-name">' + b.name + '</div>';
                    blindsHtml += '<div class="blind-status">' + pos + '% abierto</div>';
                    blindsHtml += '</div>';
                    blindsHtml += '<div class="blind-slider-wrap">';
                    blindsHtml += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 0)">▼</button>';
                    blindsHtml += '<div class="blind-slider-container">';
                    blindsHtml += '<div class="blind-slider-fill" id="blindFill_' + b.id + '" style="width: ' + pos + '%"></div>';
                    blindsHtml += '<input type="range" class="blind-range" min="0" max="100" value="' + pos + '" oninput="setBlind(\'' + b.id + '\', this.value)">';
                    blindsHtml += '</div>';
                    blindsHtml += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 100)">▲</button>';
                    blindsHtml += '</div>';
                    blindsHtml += '<span class="blind-pos" id="blindPos_' + b.id + '">' + pos + '%</span>';
                    blindsHtml += '</div>';
                });
                document.getElementById('blindsList').innerHTML = blindsHtml;
            } else {
                document.getElementById('blindsSection').style.display = 'none';
            }

            // Update status bar with light count
            const allLights = Object.values(rooms).flat();
            const totalOn = allLights.filter(l => l.attributes?.isOn).length;
            document.getElementById('lightsCount').textContent = totalOn + ' luces encendidas';
        }

        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
