<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏠 Mi Casa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --bg: #1a1a24;
            --surface: #252532;
            --surface-2: #2f2f40;
            --accent: #4ade80;
            --accent-dim: rgba(74, 222, 128, 0.15);
            --blue: #60a5fa;
            --purple: #a855f7;
            --text: #ffffff;
            --text-2: #9ca3af;
            --text-3: #6b7280;
        }
        
        html, body { height: 100%; overflow: hidden; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }
        
        /* TOP BAR */
        .top-bar {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 12px;
            padding: 16px;
            background: var(--surface);
            flex-shrink: 0;
            position: relative;
        }
        
        .fullscreen-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: var(--surface-2);
            color: var(--text-2);
            font-size: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .fullscreen-btn:active { transform: scale(0.95); }
        
        .time-card {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 20px;
            padding: 14px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .time-value { font-size: 36px; font-weight: 700; letter-spacing: -2px; }
        .time-date { font-size: 12px; opacity: 0.9; margin-top: 2px; }
        
        .time-weather {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .time-weather-icon { font-size: 20px; }
        .time-weather-temp { font-weight: 600; }
        .time-weather-forecast { font-size: 11px; opacity: 0.8; margin-left: 8px; }
        
        .scenes-card {
            background: linear-gradient(135deg, #8b5cf6, #a855f7);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .scenes-title { font-size: 10px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        
        .scenes-grid { display: flex; gap: 6px; flex: 1; align-items: center; }
        
        .scene-btn {
            flex: 1;
            aspect-ratio: 1;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .scene-btn:active { transform: scale(0.95); }
        .scene-btn.active { background: rgba(255,255,255,0.9); color: #8b5cf6; }
        
        .mode-card {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 20px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .mode-label { font-size: 10px; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; }
        .mode-value { font-size: 20px; font-weight: 700; margin-top: 6px; }
        
        /* NEWS TICKER */
        .news-ticker {
            background: var(--surface);
            padding: 10px 16px;
            border-bottom: 1px solid var(--surface-2);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            overflow: hidden;
        }
        
        .news-badge {
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        
        .news-track {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        
        .news-content {
            display: flex;
            gap: 40px;
            animation: ticker 30s linear infinite;
            white-space: nowrap;
        }
        
        .news-content:hover { animation-play-state: paused; }
        
        .news-item {
            font-size: 13px;
            color: var(--text-2);
        }
        
        .news-item span {
            color: var(--text);
            font-weight: 500;
        }
        
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        /* MAIN - ROOMS GRID */
        .main {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
            align-content: start;
        }
        
        .room-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            border: 2px solid transparent;
            min-width: 0;
        }
        
        .room-card.has-on { border-color: var(--accent); background: var(--accent-dim); }
        
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            min-width: 0;
        }
        
        .room-info { display: flex; align-items: center; gap: 8px; min-width: 0; }
        .room-icon { font-size: 24px; flex-shrink: 0; }
        .room-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .room-count { font-size: 10px; color: var(--text-3); }
        
        .room-toggle {
            width: 34px; height: 34px;
            border-radius: 9px;
            border: 2px solid var(--surface-2);
            background: var(--surface-2);
            font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .room-toggle:active { transform: scale(0.95); }
        .room-toggle.on { background: var(--accent); border-color: var(--accent); color: #000; }
        
        /* LIGHTS IN ROOM */
        .room-lights {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .light-tile {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 10px;
            border: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            min-width: 0;
        }
        
        .light-tile:active { transform: scale(0.97); }
        .light-tile.on { background: var(--accent-dim); border-color: var(--accent); }
        
        .light-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
        }
        
        .light-icon { font-size: 20px; }
        .light-btn-small {
            width: 20px; height: 20px;
            border-radius: 5px;
            border: none;
            background: var(--surface);
            color: var(--text-3);
            font-size: 9px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .light-tile.on .light-btn-small { background: var(--accent); color: #000; }
        
        .light-name {
            font-size: 10px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .light-control {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            overflow: hidden;
        }
        
        .light-btn {
            width: 24px; height: 24px;
            border-radius: 6px;
            border: none;
            background: var(--surface);
            color: var(--text-2);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .light-btn:active { transform: scale(0.9); }
        
        .light-slider-wrap {
            flex: 1;
            min-width: 0;
            height: 24px;
            display: flex;
            align-items: center;
        }
        
        .light-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: var(--surface);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            margin: 0;
        }
        .light-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        .light-tile.on .light-slider::-webkit-slider-thumb { background: var(--accent); }
        
        .light-level {
            min-width: 28px;
            text-align: right;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-2);
            flex-shrink: 0;
        }
        .light-tile.on .light-level { color: var(--accent); }
        
        /* BLINDS SECTION */
        .blinds-section {
            grid-column: 1 / -1;
            background: var(--surface);
            border-radius: 16px;
            padding: 14px;
            margin-top: 4px;
        }
        
        .blinds-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .blinds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 8px;
        }
        
        .blind-item {
            background: var(--surface-2);
            border-radius: 10px;
            padding: 10px;
        }
        
        .blind-name { font-size: 11px; color: var(--text-2); margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .blind-control { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        
        .blind-btn {
            width: 28px; height: 28px;
            border-radius: 8px;
            border: none;
            background: var(--surface);
            color: var(--text-2);
            font-size: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .blind-slider-wrap {
            flex: 1;
            min-width: 0;
            height: 28px;
            display: flex;
            align-items: center;
        }
        
        .blind-slider {
            width: 100%;
            height: 8px;
            -webkit-appearance: none;
            background: var(--surface);
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            margin: 0;
        }
        .blind-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--blue);
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
        
        .blind-pos {
            min-width: 32px;
            text-align: right;
            font-size: 11px;
            font-weight: 600;
            color: var(--blue);
            flex-shrink: 0;
        }
        
        /* STATUS BAR */
        .status-bar {
            padding: 10px 16px;
            background: var(--surface);
            border-top: 1px solid var(--surface-2);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-3);
            flex-shrink: 0;
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 2px; }
        
        @media (max-width: 600px) {
            .top-bar { grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; }
            .time-card { grid-column: 1 / -1; }
            .time-value { font-size: 32px; }
            .main { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 8px; }
            .room-lights { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Pantalla completa">⛶</button>
    
    <div class="top-bar">
        <div class="time-card">
            <div class="time-value" id="time">--:--</div>
            <div class="time-date" id="date"></div>
            <div class="time-weather" id="timeWeather">
                <span class="time-weather-icon">⛅</span>
                <span class="time-weather-temp" id="weatherTemp">--°</span>
                <span class="time-weather-forecast" id="weatherForecast">Mañ: --</span>
            </div>
        </div>
        <div class="scenes-card">
            <div class="scenes-title">Escenas</div>
            <div class="scenes-grid">
                <button class="scene-btn" onclick="setScene('relax', event)">☕</button>
                <button class="scene-btn" onclick="setScene('movie', event)">🎬</button>
                <button class="scene-btn" onclick="setScene('away', event)">🚶</button>
            </div>
        </div>
        <div class="mode-card">
            <div class="mode-label">Modo</div>
            <div class="mode-value">CASA</div>
        </div>
    </div>
    
    <div class="news-ticker">
        <span class="news-badge">News</span>
        <div class="news-track">
            <div class="news-content" id="newsContent"></div>
        </div>
    </div>
    
    <div class="main" id="main"></div>
    
    <div class="status-bar">
        <span id="statusText">Cargando...</span>
        <span id="lightsCount">0 luces encendidas</span>
    </div>

    <script>
        const API = 'http://192.168.1.172:9876/api';
        const TOKEN = 'YOUR_TOKEN_HERE';
        
        let devices = [];
        
        const ROOM_ICONS = {
            'Salón': '🛋️', 'Habitación': '🛏️', 'Baño': '🚿', 'Entrada': '🚪',
            'Despacho': '💻', 'Desván': '🏠', 'Ducha': '🚿', 'Mary': '🛁',
            'Escalera': '🪜', 'Estor': '🪟', 'Vestidor': '👔', 'Ender': '⚡'
        };
        const ROOM_ORDER = ['Salón', 'Habitación', 'Baño', 'Ducha', 'Entrada', 'Despacho', 'Desván', 'Escalera', 'Vestidor', 'Mary', 'Ender'];
        
        // Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }
        
        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('date').textContent = now.toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
        }
        updateClock();
        setInterval(updateClock, 1000);
        
        // Weather - As Pontes
        async function loadWeather() {
            try {
                const res = await fetch('https://wttr.in/As%20Pontes?format=j1');
                const data = await res.json();
                const current = data.current_condition[0];
                const tomorrow = data.weather[1]?.hourly[4];
                document.getElementById('weatherTemp').textContent = current.temp_C + '°C';
                if (tomorrow) {
                    document.getElementById('weatherForecast').textContent = 'Mañ: ' + getWeatherIcon(tomorrow.weatherCode) + ' ' + tomorrow.tempC + '°';
                }
            } catch (e) { }
        }
        
        function getWeatherIcon(code) {
            if (code == 113) return '☀️';
            if (code == 116) return '⛅';
            if (code == 119 || code == 122) return '☁️';
            if (code >= 127 && code <= 143) return '🌧️';
            if (code >= 176 && code <= 263) return '🌧️';
            if (code >= 266 && code <= 299) return '🌧️';
            if (code >= 305 && code <= 386) return '🌧️';
            if (code >= 389 && code <= 395) return '⛈️';
            return '🌤️';
        }
        
        loadWeather();
        setInterval(loadWeather, 300000);
        
        // News Feed
        const NEWS_ITEMS = [
            '<span>IA:</span> GPT-5 esperado para junio con razonamiento avanzado',
            '<span>Tech:</span> Apple presenta nuevos chips M4 para Mac',
            '<span>Cycling:</span> Pogacar gana otra etapa en el Tour',
            '<span>Spain:</span> El INE confirma crecimiento del PIB',
            '<span>AI:</span> Gemini 2.0 disponible con modo agente',
            '<span>Gaming:</span> GTA VI filtrado: primavera 2026',
            '<span>IA:</span> Claude Code supera 1M de desarrolladores',
            '<span>Tech:</span> Samsung lanza pantalla enrollable para 2026',
            '<span>Cycling:</span> Vingegaard se recupera para el Tour',
            '<span>AI:</span> OpenAI lanza API para agentes autonomousos',
            '<span>Spain:</span> Galicia: tempo estable toda a semana',
            '<span>Tech:</span> Elon Musk presenta Grok 3 con razonamento visual'
        ];
        
        function loadNews() {
            let html = '';
            // Duplicate for seamless loop
            for (let i = 0; i < 3; i++) {
                NEWS_ITEMS.forEach(item => {
                    html += '<span class="news-item">' + item + '</span>';
                });
            }
            document.getElementById('newsContent').innerHTML = html;
        }
        loadNews();
        
        async function apiCall(endpoint, method, body) {
            try {
                const opts = { method, headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' } };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(API + endpoint, opts);
                return await res.json();
            } catch (e) { return null; }
        }
        
        async function loadDevices() {
            document.getElementById('statusText').textContent = 'Conectando...';
            const data = await apiCall('/v1/devices', 'GET');
            if (data && Array.isArray(data)) {
                devices = data;
                document.getElementById('statusText').textContent = '✓ Conectado';
                renderUI();
            } else {
                document.getElementById('statusText').textContent = '✗ Error';
            }
        }
        
        function getRoom(name) {
            const n = name.toLowerCase();
            // Salon / Living
            if (n.includes('salon') || n.includes('living')) return 'Salón';
            // Habitaciones
            if (n.includes('habitacion') || n.includes('habitacion')) return 'Habitación';
            // Baño
            if (n.includes('baño')) return 'Baño';
            // Ducha
            if (n.includes('ducha')) return 'Ducha';
            // Entrada
            if (n.includes('entrada')) return 'Entrada';
            // Despacho
            if (n.includes('despacho')) return 'Despacho';
            // Desván
            if (n.includes('desvan')) return 'Desván';
            // Escalera
            if (n.includes('escalera')) return 'Escalera';
            // Estor
            if (n.includes('estor')) return 'Estor';
            // Vestidor
            if (n.includes('vestidor')) return 'Vestidor';
            // Mary
            if (n.includes('mary')) return 'Mary';
            // Ender (solo si realmente es Ender)
            if (n.includes('ender') && !n.includes('salon') && !n.includes('salón')) return 'Ender';
            // Salon con o sin tilde
            if (n.includes('salon') || n.includes('salón')) return 'Salón';
            return 'Ender';
        }
        
        function getLightIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('techo')) return '💡';
            if (n.includes('mesa')) return '🪫';
            if (n.includes('pared')) return '🔦';
            if (n.includes('lampara')) return '🔆';
            return '💡';
        }
        
        async function toggleLight(id, isOn) {
            const dev = devices.find(d => d.id === id);
            if (dev) { dev.attributes.isOn = isOn; renderUI(); }
            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { isOn } }]);
        }
        
        async function setLightLevel(id, level) {
            const dev = devices.find(d => d.id === id);
            if (dev) {
                dev.attributes.isOn = true;
                dev.attributes.lightLevel = parseInt(level);
                renderUI();
                await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { isOn: true } }]);
                await new Promise(r => setTimeout(r, 100));
                await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { lightLevel: parseInt(level) } }]);
            }
        }
        
        async function adjustLevel(id, delta) {
            const dev = devices.find(d => d.id === id);
            if (dev) {
                const current = dev.attributes.lightLevel || 100;
                const newLevel = Math.max(1, Math.min(100, current + delta));
                await setLightLevel(id, newLevel);
            }
        }
        
        async function toggleRoom(roomName) {
            const roomDevices = devices.filter(d => {
                const name = d.attributes?.customName || d.attributes?.name || '';
                return getRoom(name) === roomName && (d.type === 'light' || d.type === 'lamp');
            });
            const anyOn = roomDevices.some(d => d.attributes?.isOn);
            const newState = !anyOn;
            for (const dev of roomDevices) {
                dev.attributes.isOn = newState;
                await apiCall('/v1/devices/' + dev.id, 'PATCH', [{ attributes: { isOn: newState } }]);
            }
            renderUI();
        }
        
        async function setBlind(id, pos) {
            const dev = devices.find(d => d.id === id);
            if (dev) { dev.attributes.currentPosition = parseInt(pos); renderUI(); }
            await apiCall('/v1/devices/' + id, 'PATCH', [{ attributes: { currentPosition: parseInt(pos) } }]);
        }
        
        async function setScene(scene, e) {
            if (e) e.stopPropagation();
            document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (scene === 'relax') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = true;
                    d.attributes.lightLevel = 30;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: true, lightLevel: 30 } }]);
                });
            } else if (scene === 'away') {
                devices.filter(d => d.type === 'light' || d.type === 'lamp').forEach(d => {
                    d.attributes.isOn = false;
                    apiCall('/v1/devices/' + d.id, 'PATCH', [{ attributes: { isOn: false } }]);
                });
            }
            renderUI();
        }
        
        function renderUI() {
            const rooms = {};
            const blinds = [];
            
            devices.forEach(d => {
                const type = d.type || '';
                const name = d.attributes?.customName || d.attributes?.name || '?';
                const room = getRoom(name);
                if (type === 'light' || type === 'lamp') {
                    if (!rooms[room]) rooms[room] = [];
                    rooms[room].push({ ...d, name });
                } else if (type.includes('blinds') || type.includes('blind')) {
                    blinds.push({ ...d, name });
                }
            });
            
            let html = '';
            ROOM_ORDER.forEach(room => {
                if (!rooms[room]) return;
                const lights = rooms[room];
                const onCount = lights.filter(l => l.attributes?.isOn).length;
                const hasOn = onCount > 0;
                const icon = ROOM_ICONS[room] || '🏠';
                
                html += '<div class="room-card' + (hasOn ? ' has-on' : '') + '">';
                html += '<div class="room-header">';
                html += '<div class="room-info">';
                html += '<span class="room-icon">' + icon + '</span>';
                html += '<div>';
                html += '<div class="room-name">' + room + '</div>';
                html += '<div class="room-count">' + onCount + ' / ' + lights.length + ' on</div>';
                html += '</div></div>';
                html += '<button class="room-toggle' + (hasOn ? ' on' : '') + '" onclick="toggleRoom(\'' + room + '\')">' + (hasOn ? '⭕' : '✅') + '</button>';
                html += '</div>';
                html += '<div class="room-lights">';
                
                lights.forEach(l => {
                    const isOn = l.attributes?.isOn;
                    const level = l.attributes?.lightLevel || 100;
                    
                    html += '<div class="light-tile' + (isOn ? ' on' : '') + '" onclick="toggleLight(\'' + l.id + '\', ' + !isOn + ')">';
                    html += '<div class="light-top">';
                    html += '<span class="light-icon">' + getLightIcon(l.name) + '</span>';
                    html += '<button class="light-btn-small" onclick="event.stopPropagation(); toggleLight(\'' + l.id + '\', ' + !isOn + ')">' + (isOn ? '🔴' : '⚫') + '</button>';
                    html += '</div>';
                    html += '<div class="light-name">' + l.name.split(' ').slice(1).join(' ') + '</div>';
                    html += '<div class="light-control" onclick="event.stopPropagation()">';
                    html += '<button class="light-btn" onclick="adjustLevel(\'' + l.id + '\', -10)">−</button>';
                    html += '<div class="light-slider-wrap"><input type="range" class="light-slider" min="1" max="100" value="' + level + '" oninput="setLightLevel(\'' + l.id + '\', this.value)"></div>';
                    html += '<button class="light-btn" onclick="adjustLevel(\'' + l.id + '\', 10)">+</button>';
                    html += '<span class="light-level">' + level + '%</span>';
                    html += '</div></div>';
                });
                
                html += '</div></div>';
            });
            
            if (blinds.length) {
                html += '<div class="blinds-section">';
                html += '<div class="blinds-title">🪟 Persianas</div>';
                html += '<div class="blinds-grid">';
                blinds.forEach(b => {
                    const pos = b.attributes?.currentPosition || 0;
                    html += '<div class="blind-item">';
                    html += '<div class="blind-name">' + b.name + '</div>';
                    html += '<div class="blind-control">';
                    html += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 0)">▼</button>';
                    html += '<div class="blind-slider-wrap"><input type="range" class="blind-slider" min="0" max="100" value="' + pos + '" oninput="setBlind(\'' + b.id + '\', this.value)"></div>';
                    html += '<button class="blind-btn" onclick="setBlind(\'' + b.id + '\', 100)">▲</button>';
                    html += '<span class="blind-pos">' + pos + '%</span>';
                    html += '</div></div>';
                });
                html += '</div></div>';
            }
            
            document.getElementById('main').innerHTML = html;
            
            const allLights = Object.values(rooms).flat();
            const totalOn = allLights.filter(l => l.attributes?.isOn).length;
            document.getElementById('lightsCount').textContent = totalOn + ' luces encendidas';
        }
        
        loadDevices();
        setInterval(loadDevices, 5000);
    </script>
</body>
</html>
